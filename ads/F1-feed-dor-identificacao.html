<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>F1 — Feed Hook Provocação</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; background: #FDF8F0; }
  .card {
    width: 1080px; height: 1080px; background: #FDF8F0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; padding: 90px 100px;
  }
  .card::before {
    content: ''; position: absolute;
    top: 30px; right: 30px; bottom: 30px; left: 30px;
    border: 1px solid #C5A55A; opacity: 0.25; pointer-events: none;
  }
  .headline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 700; font-size: 64px; line-height: 1.2;
    color: #3E2C1C; text-align: center; margin-bottom: 40px;
  }
  .highlight { color: #2D6B4F; }
  .gold-line { width: 80px; height: 2px; background: #C5A55A; margin-bottom: 40px; }
  .punchline {
    font-family: 'Lato', sans-serif; font-weight: 400; font-size: 30px;
    line-height: 1.6; color: #5C4033; text-align: center; max-width: 750px;
    margin-bottom: 50px;
  }
  .cta-box {
    background: #2D6B4F; color: #fff;
    font-family: 'Lato', sans-serif; font-weight: 700; font-size: 26px;
    padding: 22px 50px; border-radius: 8px; margin-bottom: 20px;
  }
  .details {
    font-family: 'Lato', sans-serif; font-weight: 400; font-size: 18px;
    color: #8B7340; letter-spacing: 0.5px;
  }
  .signature {
    position: absolute; bottom: 45px; right: 55px; text-align: right;
  }
  .sig-line { width: 40px; height: 1px; background: #C5A55A; margin-left: auto; margin-bottom: 8px; }
  .sig-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic; font-weight: 600; font-size: 22px; color: #2D6B4F;
  }
</style>
</head>
<body>
<div class="card">
  <div class="headline">
    Você cobra barato<br>
    porque sua mãe<br>
    <span class="highlight">nunca cobrou nada.</span>
  </div>
  <div class="gold-line"></div>
  <div class="punchline">
    Isso não é insegurança.<br>
    É uma lealdade invisível ao seu sistema familiar.
  </div>
  <div class="cta-box">15 perguntas revelam qual é a sua</div>
  <div class="details">R$47 · Relatório na hora · Garantia 7 dias</div>
  <div class="signature">
    <div class="sig-line"></div>
    <div class="sig-name">Marina Veauvy</div>
  </div>
</div>
</body>
</html>
