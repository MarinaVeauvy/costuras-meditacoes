<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendar com Fernanda Rosa | Psicanalista</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #FAF8F5;
      --green-deep: #2D4A3E;
      --green-mid: #3D6B5A;
      --green-light: #5A8F7B;
      --green-soft: rgba(61,107,90,0.08);
      --gold: #B8956A;
      --gold-light: #D4B896;
      --text-dark: #2C2C2C;
      --text-body: #4A4A4A;
      --text-muted: #7A7A7A;
      --white: #FFFFFF;
      --border: rgba(45,74,62,0.12);
      --shadow: 0 2px 20px rgba(0,0,0,0.06);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-body); line-height: 1.6; }
    .container { max-width: 520px; margin: 0 auto; padding: 0 16px; }

    /* Header */
    .header { background: linear-gradient(135deg, var(--green-deep), var(--green-mid)); padding: 32px 16px; text-align: center; }
    .header h1 { font-family: 'Playfair Display', serif; color: #fff; font-size: 1.5rem; margin-bottom: 4px; }
    .header p { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
    .header .tipo { display: inline-block; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); padding: 4px 14px; border-radius: 20px; font-size: 0.8rem; margin-top: 8px; }

    /* Steps */
    .steps { display: flex; gap: 0; margin: 24px 0 16px; }
    .step { flex: 1; text-align: center; padding: 10px 4px; font-size: 0.75rem; color: var(--text-muted); border-bottom: 2px solid var(--border); transition: all 0.3s; }
    .step.active { color: var(--green-deep); border-color: var(--green-deep); font-weight: 600; }
    .step.done { color: var(--green-light); border-color: var(--green-light); }

    /* Calendar */
    .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .cal-nav button { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 0.85rem; color: var(--text-body); }
    .cal-nav button:hover { background: var(--green-soft); }
    .cal-nav span { font-weight: 600; color: var(--text-dark); font-size: 0.95rem; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-bottom: 16px; }
    .cal-grid .day-label { font-size: 0.7rem; color: var(--text-muted); padding: 4px; font-weight: 500; }
    .cal-grid .day { padding: 10px 4px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
    .cal-grid .day:hover:not(.disabled):not(.empty) { background: var(--green-soft); }
    .cal-grid .day.selected { background: var(--green-deep); color: #fff; font-weight: 600; }
    .cal-grid .day.disabled { color: #ccc; cursor: default; }
    .cal-grid .day.empty { cursor: default; }
    .cal-grid .day.today { border: 2px solid var(--gold); }
    .cal-grid .day.has-slots { color: var(--green-deep); font-weight: 500; }

    /* Slots */
    .slots-section { margin-top: 16px; }
    .slots-title { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
    .slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .slot-btn { padding: 12px 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--white); cursor: pointer; font-size: 0.9rem; color: var(--text-dark); text-align: center; transition: all 0.2s; }
    .slot-btn:hover { border-color: var(--green-mid); background: var(--green-soft); }
    .slot-btn.selected { background: var(--green-deep); color: #fff; border-color: var(--green-deep); }
    .no-slots { text-align: center; color: var(--text-muted); padding: 24px; font-size: 0.9rem; }

    /* Form */
    .form-section { margin-top: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
    .form-group input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; transition: border 0.2s; }
    .form-group input:focus { border-color: var(--green-mid); }
    .form-group input::placeholder { color: #bbb; }

    /* Buttons */
    .btn-primary { display: block; width: 100%; padding: 14px; background: var(--green-deep); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 16px; }
    .btn-primary:hover { background: var(--green-mid); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-back { display: inline-block; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.85rem; margin-top: 12px; }

    /* Confirmation */
    .confirmation { text-align: center; padding: 40px 20px; }
    .confirmation .check { font-size: 3rem; margin-bottom: 16px; }
    .confirmation h2 { font-family: 'Playfair Display', serif; color: var(--green-deep); margin-bottom: 8px; }
    .confirmation .detail { background: var(--white); border-radius: 12px; padding: 20px; margin: 16px 0; box-shadow: var(--shadow); text-align: left; }
    .confirmation .detail p { margin-bottom: 6px; font-size: 0.9rem; }
    .confirmation .detail strong { color: var(--green-deep); }

    /* Loading */
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--green-mid); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Panel */
    .panel { background: var(--white); border-radius: 16px; padding: 24px; margin: 20px 0; box-shadow: var(--shadow); }

    /* Responsive */
    @media (max-width: 360px) {
      .slots-grid { grid-template-columns: repeat(2, 1fr); }
      .cal-grid .day { padding: 8px 2px; font-size: 0.8rem; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Fernanda Rosa</h1>
    <p>Psicanalista</p>
    <div class="tipo" id="eventTitle">Sessão de Psicanálise</div>
  </div>

  <div class="container">
    <div class="steps">
      <div class="step active" id="step1">Data e Horário</div>
      <div class="step" id="step2">Seus Dados</div>
      <div class="step" id="step3">Confirmação</div>
    </div>

    <!-- STEP 1: Calendar + Slots -->
    <div id="panelCalendar" class="panel">
      <div class="cal-nav">
        <button onclick="prevMonth()">&larr;</button>
        <span id="monthLabel"></span>
        <button onclick="nextMonth()">&rarr;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="slots-section" id="slotsSection">
        <div class="loading" id="slotsLoading"><div class="spinner"></div><br>Carregando horários...</div>
        <div id="slotsContent" class="hidden">
          <div class="slots-title" id="slotsTitle"></div>
          <div class="slots-grid" id="slotsGrid"></div>
        </div>
        <div id="noSlots" class="no-slots hidden">Nenhum horário disponível neste dia.</div>
      </div>
      <button class="btn-primary" id="btnNext1" disabled onclick="goToStep2()">Continuar</button>
    </div>

    <!-- STEP 2: Form -->
    <div id="panelForm" class="panel hidden">
      <div class="form-section">
        <div class="form-group">
          <label>Nome completo *</label>
          <input type="text" id="inputName" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
          <label>WhatsApp *</label>
          <input type="tel" id="inputPhone" placeholder="(19) 99999-9999" required>
        </div>
        <div class="form-group">
          <label>E-mail (opcional)</label>
          <input type="email" id="inputEmail" placeholder="seu@email.com">
        </div>
      </div>
      <button class="btn-primary" id="btnConfirm" onclick="submitBooking()">Confirmar Agendamento</button>
      <button class="btn-back" onclick="goToStep1()">&larr; Voltar</button>
    </div>

    <!-- STEP 3: Confirmation -->
    <div id="panelConfirm" class="panel hidden">
      <div class="confirmation">
        <div class="check">&#x1F33F;</div>
        <h2>Agendamento Confirmado!</h2>
        <p>A Fernanda te espera.</p>
        <div class="detail" id="confirmDetail"></div>
        <p style="font-size:0.8rem;color:var(--text-muted);margin-top:12px;">Você receberá um lembrete 24h antes.</p>
      </div>
    </div>

    <!-- Loading overlay -->
    <div id="bookingLoading" class="panel hidden">
      <div class="loading"><div class="spinner"></div><br>Agendando...</div>
    </div>
  </div>

<script>
const API_BASE = 'https://webhook-pa.vercel.app/api/booking';
const EVENT_TYPES = {
  'entrevista-gratuita': { id: 5022253, title: 'Entrevista Gratuita', duration: '60 min' },
  'sessao-psicanalise': { id: 5022255, title: 'Sessão de Psicanálise', duration: '60 min' },
};

// Parse URL params
const params = new URLSearchParams(window.location.search);
const eventSlug = params.get('type') || 'sessao-psicanalise';
const eventConfig = EVENT_TYPES[eventSlug] || EVENT_TYPES['sessao-psicanalise'];

document.getElementById('eventTitle').textContent = eventConfig.title;

// State
let currentMonth = new Date();
let selectedDate = null;
let selectedSlot = null;
let slotsCache = {};

const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function renderCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  document.getElementById('monthLabel').textContent = `${MESES[month]} ${year}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = DIAS.map(d => `<div class="day-label">${d}</div>`).join('');

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  today.setHours(0,0,0,0);

  for (let i = 0; i < firstDay; i++) {
    grid.innerHTML += '<div class="day empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    const dateStr = formatDate(date);
    const isPast = date < today;
    const isToday = date.getTime() === today.getTime();
    const isSelected = selectedDate === dateStr;

    let classes = 'day';
    if (isPast) classes += ' disabled';
    if (isToday) classes += ' today';
    if (isSelected) classes += ' selected';

    grid.innerHTML += `<div class="${classes}" onclick="${isPast ? '' : `selectDay('${dateStr}')`}">${d}</div>`;
  }
}

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function prevMonth() {
  currentMonth.setMonth(currentMonth.getMonth() - 1);
  renderCalendar();
}
function nextMonth() {
  currentMonth.setMonth(currentMonth.getMonth() + 1);
  renderCalendar();
}

async function selectDay(dateStr) {
  selectedDate = dateStr;
  selectedSlot = null;
  document.getElementById('btnNext1').disabled = true;
  renderCalendar();

  // Show loading
  document.getElementById('slotsLoading').classList.remove('hidden');
  document.getElementById('slotsContent').classList.add('hidden');
  document.getElementById('noSlots').classList.add('hidden');

  // Fetch slots
  const slots = await fetchSlots(dateStr);

  document.getElementById('slotsLoading').classList.add('hidden');

  if (slots.length === 0) {
    document.getElementById('noSlots').classList.remove('hidden');
    return;
  }

  const [y, m, d] = dateStr.split('-');
  const dt = new Date(Number(y), Number(m)-1, Number(d));
  const diaSemana = DIAS[dt.getDay()];
  document.getElementById('slotsTitle').textContent = `Horários para ${diaSemana}, ${d}/${m}:`;
  document.getElementById('slotsContent').classList.remove('hidden');

  const grid = document.getElementById('slotsGrid');
  grid.innerHTML = slots.map(s =>
    `<div class="slot-btn" onclick="selectSlot(this, '${s.time}')">${s.display}</div>`
  ).join('');
}

async function fetchSlots(dateStr) {
  if (slotsCache[dateStr]) return slotsCache[dateStr];

  try {
    const res = await fetch(`${API_BASE}/slots?eventTypeId=${eventConfig.id}&start=${dateStr}&end=${dateStr}`);
    const data = await res.json();
    const slots = data.slots?.[dateStr] || [];
    slotsCache[dateStr] = slots;
    return slots;
  } catch (e) {
    console.error('Fetch slots error:', e);
    return [];
  }
}

function selectSlot(el, time) {
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedSlot = time;
  document.getElementById('btnNext1').disabled = false;
}

function goToStep2() {
  document.getElementById('panelCalendar').classList.add('hidden');
  document.getElementById('panelForm').classList.remove('hidden');
  document.getElementById('step1').classList.replace('active', 'done');
  document.getElementById('step2').classList.add('active');
}

function goToStep1() {
  document.getElementById('panelForm').classList.add('hidden');
  document.getElementById('panelCalendar').classList.remove('hidden');
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.replace('done', 'active');
}

async function submitBooking() {
  const name = document.getElementById('inputName').value.trim();
  const phone = document.getElementById('inputPhone').value.trim();
  const email = document.getElementById('inputEmail').value.trim();

  if (!name) return alert('Preencha seu nome');
  if (!phone) return alert('Preencha seu WhatsApp');

  document.getElementById('panelForm').classList.add('hidden');
  document.getElementById('bookingLoading').classList.remove('hidden');

  try {
    const res = await fetch(`${API_BASE}/create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        eventTypeId: eventConfig.id,
        startTime: selectedSlot,
        name,
        phone,
        email: email || undefined,
      }),
    });

    const data = await res.json();
    document.getElementById('bookingLoading').classList.add('hidden');

    if (data.success) {
      document.getElementById('step2').classList.replace('active', 'done');
      document.getElementById('step3').classList.add('active');
      document.getElementById('panelConfirm').classList.remove('hidden');
      document.getElementById('confirmDetail').innerHTML = `
        <p><strong>${eventConfig.title}</strong></p>
        <p>Data: <strong>${data.booking.date}</strong></p>
        <p>Horário: <strong>${data.booking.time}</strong></p>
        <p>Duração: ${eventConfig.duration}</p>
        <p>Nome: ${name}</p>
        <p>WhatsApp: ${phone}</p>
        ${data.booking.meetLink ? `<p>Link: <a href="${data.booking.meetLink}" target="_blank">Google Meet</a></p>` : ''}
      `;
    } else {
      document.getElementById('panelForm').classList.remove('hidden');
      alert(data.error || 'Erro ao agendar. Tente novamente.');
    }
  } catch (e) {
    document.getElementById('bookingLoading').classList.add('hidden');
    document.getElementById('panelForm').classList.remove('hidden');
    alert('Erro de conexão. Tente novamente.');
  }
}

// Phone mask
document.getElementById('inputPhone').addEventListener('input', function(e) {
  let v = e.target.value.replace(/\D/g, '');
  if (v.length > 11) v = v.slice(0, 11);
  if (v.length > 7) v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
  else if (v.length > 2) v = `(${v.slice(0,2)}) ${v.slice(2)}`;
  e.target.value = v;
});

// Init
renderCalendar();
document.getElementById('slotsLoading').classList.add('hidden');
</script>

</body>
</html>
