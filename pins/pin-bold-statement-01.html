<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1000">
<title>Pin — Sua Concorrência Já Usa IA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .pin {
    width: 1000px;
    height: 1500px;
    background: #0B0A12;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 100px 80px;
    position: relative;
  }

  .micro-tag {
    font-family: 'Lato', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #D4AF37;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .micro-tag::before {
    content: '';
    width: 8px;
    height: 8px;
    background: #D4AF37;
    border-radius: 50%;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.1;
    margin-bottom: 30px;
    max-width: 800px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .gold-line {
    width: 30%;
    height: 2px;
    background: #D4AF37;
    margin-bottom: 30px;
  }

  .body {
    font-family: 'Lato', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.7);
    line-height: 1.6;
    margin-bottom: 60px;
    max-width: 720px;
  }

  .cta-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #e94560;
    color: #FFFFFF;
    font-family: 'Lato', sans-serif;
    font-size: 26px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 20px 48px;
    border-radius: 30px;
    margin-bottom: 20px;
  }

  .footer {
    font-family: 'Lato', sans-serif;
    font-size: 18px;
    color: rgba(212, 175, 55, 0.4);
    position: absolute;
    bottom: 50px;
    left: 80px;
  }
</style>
</head>
<body>
<div class="pin">
  <div class="micro-tag">Verdade Inconveniente</div>
  <h1 class="headline">Sua Concorrência Já Usa IA. E Você?</h1>
  <div class="gold-line"></div>
  <p class="body">Enquanto você pondera, empreendedores ao seu redor estão usando inteligência artificial para vender mais, atender melhor e crescer com menos esforço.</p>
  <div class="cta-pill">Baixe o E-book Grátis <span>&rarr;</span></div>
  <div class="footer">@marinaveauvy</div>
</div>
</body>
</html>
