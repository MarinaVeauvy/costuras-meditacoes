<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1000">
<title>Pin — 7 Formas de Usar ChatGPT no Seu Negócio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .pin {
    width: 1000px;
    height: 1500px;
    background: #F5EDE3;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 80px 70px;
    position: relative;
    overflow: hidden;
  }

  .badge {
    font-family: 'Lato', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #D4AF37;
    margin-bottom: 30px;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px;
    font-weight: 700;
    color: #2C1810;
    line-height: 1.12;
    margin-bottom: 24px;
    max-width: 860px;
  }

  .divider {
    width: 40%;
    height: 1px;
    background: #E8D5A3;
    margin-bottom: 24px;
  }

  .subheadline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 400;
    font-style: italic;
    color: rgba(44, 24, 16, 0.7);
    line-height: 1.35;
    margin-bottom: 40px;
    max-width: 780px;
  }

  .body {
    font-family: 'Lato', sans-serif;
    font-size: 28px;
    font-weight: 300;
    color: #2C1810;
    line-height: 1.6;
    margin-bottom: 60px;
    max-width: 760px;
  }

  .cta-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #2C1810;
    color: #D4AF37;
    font-family: 'Lato', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 18px 44px;
    border-radius: 30px;
    margin-bottom: 20px;
  }

  .footer {
    font-family: 'Lato', sans-serif;
    font-size: 18px;
    color: rgba(212, 175, 55, 0.5);
    position: absolute;
    bottom: 50px;
    left: 70px;
  }
</style>
</head>
<body>
<div class="pin">
  <div class="badge">Inteligência Artificial</div>
  <h1 class="headline">7 Formas de Usar o ChatGPT no Seu Negócio</h1>
  <div class="divider"></div>
  <p class="subheadline">Do atendimento ao cliente à criação de conteúdo — guia prático para 2026</p>
  <p class="body">Descubra aplicações reais de IA que economizam horas do seu dia e aceleram o crescimento do seu negócio.</p>
  <div class="cta-pill">Leia o Artigo <span>&rarr;</span></div>
  <div class="footer">marinaveauvy.com.br</div>
</div>
</body>
</html>
