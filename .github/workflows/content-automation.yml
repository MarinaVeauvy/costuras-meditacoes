name: Content Automation

on:
  schedule:
    # Artigos: Seg e Qui 08:00 UTC (2 artigos cada = 4/semana)
    - cron: '0 8 * * 1,4'
    # Newsletter Impulso IA: Terça 10:00 UTC (07h BRT)
    - cron: '0 10 * * 2'
    # Newsletter Dinheiro Simples: Quinta 10:00 UTC (07h BRT)
    - cron: '0 10 * * 4'
    # Newsletter Renda Extra: Sábado 12:00 UTC (09h BRT)
    - cron: '0 12 * * 6'
    # Pinterest: Qua e Sex 14:00 UTC (gerar + publicar)
    - cron: '0 14 * * 3,5'
    # Medium: Domingo 15:00 UTC (republish últimos artigos)
    - cron: '0 15 * * 0'
    # YouTube retry upload: diário 12:00 UTC (tenta uploads pendentes)
    - cron: '0 12 * * *'
    # SEO Internal Links: 1o dia do mês 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Ação a executar'
        required: true
        type: choice
        options:
          - articles
          - newsletter-impulso-ia
          - newsletter-dinheiro-simples
          - newsletter-renda-extra
          - all-newsletters
          - pinterest
          - web-stories
          - youtube
          - youtube-retry
          - twitter
          - linkedin
          - medium
          - seo-links

permissions:
  contents: write

jobs:
  articles:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1,4') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'articles')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Gerar e publicar 2 artigos + push notification
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          ARTICLE_COUNT: '2'
        run: node scripts/generate-article.js

  newsletter:
    if: >
      (github.event_name == 'schedule' && contains('0 10 * * 2,0 10 * * 4,0 12 * * 6', github.event.schedule)) ||
      (github.event_name == 'workflow_dispatch' && contains(github.event.inputs.action, 'newsletter'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enviar newsletter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'all-newsletters' && 'all' || github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'newsletter-impulso-ia' && 'impulso-ia' || github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'newsletter-dinheiro-simples' && 'dinheiro-simples' || github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'newsletter-renda-extra' && 'renda-extra' || '' }}
        run: node scripts/send-newsletter.js

  pinterest:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 14 * * 3,5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'pinterest')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Gerar pins para artigos sem pin
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
        run: node scripts/generate-all-pins.js
      - name: Publicar pins no Pinterest
        env:
          PINTEREST_TOKEN: ${{ secrets.PINTEREST_TOKEN }}
          PIN_BATCH_SIZE: '5'
        run: node scripts/pinterest-publish.js
      - name: Commit alterações
        run: |
          git config user.name "Content Bot"
          git config user.email "bot@marinaveauvy.com.br"
          git add pinterest-pins.json pinterest-published.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update pinterest pins and published log"
          git push

  web-stories:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1,4') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'web-stories')
    needs: articles
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Gerar Web Stories dos artigos recentes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          STORY_COUNT: '3'
        run: node scripts/generate-web-stories.js
      - name: Commit Web Stories
        run: |
          git config user.name "Content Bot"
          git config user.email "bot@marinaveauvy.com.br"
          git add web-stories/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: add new web stories"
          git push

  youtube:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1,4') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'youtube')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependências
        run: |
          pip install edge-tts google-auth google-auth-oauthlib google-api-python-client
          sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: YouTube Factory — Script + TTS + Pexels B-roll + Render + Upload
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          YOUTUBE_OAUTH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_TOKEN }}
          VIDEO_COUNT: '3'
          PYTHON_PATH: python
        run: node scripts/youtube-factory.js
      - name: Commit arquivos
        run: |
          git config user.name "Content Bot"
          git config user.email "bot@marinaveauvy.com.br"
          git add youtube/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: youtube - 3 new videos generated and uploaded"
          git push

  youtube-retry:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'youtube-retry')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependências
        run: pip install google-auth google-auth-oauthlib google-api-python-client
      - name: Retry upload vídeos pendentes
        run: python scripts/youtube-upload.py
        env:
          UPLOAD_COUNT: '5'
          YOUTUBE_OAUTH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_TOKEN }}
      - name: Commit index
        run: |
          git config user.name "Content Bot"
          git config user.email "bot@marinaveauvy.com.br"
          git add youtube/uploaded-index.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: youtube uploads retry"
          git push

  twitter:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 14 * * 3,5') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'twitter')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Gerar threads Twitter
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          THREAD_COUNT: '3'
        run: node scripts/generate-twitter-threads.js
      - name: Commit threads
        run: |
          git config user.name "Content Bot"
          git config user.email "bot@marinaveauvy.com.br"
          git add twitter/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: add twitter threads"
          git push

  linkedin:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 15 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'linkedin')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Gerar artigos LinkedIn
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          LINKEDIN_COUNT: '3'
        run: node scripts/republish-linkedin.js
      - name: Commit artigos
        run: |
          git config user.name "Content Bot"
          git config user.email "bot@marinaveauvy.com.br"
          git add linkedin/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: add linkedin articles"
          git push

  medium:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 15 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'medium')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Republicar artigos no Medium
        env:
          MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
        run: node scripts/republish-medium.js

  seo-links:
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 6 1 * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'seo-links')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Adicionar internal links SEO
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          MAX_UPDATES: '50'
        run: node scripts/seo-internal-links.js
