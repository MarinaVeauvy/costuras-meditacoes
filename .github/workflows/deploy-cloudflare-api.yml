name: Deploy Cloudflare Worker (API)

on:
  push:
    branches: [master]
    paths:
      - 'workers/api/**'
      - '.github/workflows/deploy-cloudflare-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler + deps
        working-directory: workers/api
        run: npm install

      - name: Sync secrets do Worker (Resend + Admin)
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_KEY: ${{ secrets.NEWSLETTER_ADMIN_KEY }}
        run: |
          echo "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY
          echo "$ADMIN_KEY" | npx wrangler secret put ADMIN_KEY

      - name: Deploy worker
        working-directory: workers/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Confirma URL
        run: |
          echo "✅ Deploy concluído"
          echo "Endpoints disponíveis em:"
          echo "  - https://marinaveauvy-api.<seu-account>.workers.dev"
          echo "  - https://api.marinaveauvy.com.br (se custom domain configurado)"
