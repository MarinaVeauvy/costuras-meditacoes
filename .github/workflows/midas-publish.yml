name: Midas Auto-Publish (IG + YT Shorts)

on:
  schedule:
    # 4 slots cobrem todas as fases do ramp up:
    # 10:30 UTC = 07:30 BRT  (semana 2+)
    # 13:00 UTC = 10:00 BRT  (semana 1 warmup)
    # 16:00 UTC = 13:00 BRT  (semana 3+)
    # 22:30 UTC = 19:30 BRT  (semana 2+)
    # O midas-schedule-check.js decide se deve publicar baseado em dias desde start + slot atual.
    - cron: '30 10 * * *'
    - cron: '0 13 * * *'
    - cron: '0 16 * * *'
    - cron: '30 22 * * *'
  workflow_dispatch:
    inputs:
      video:
        description: 'Corte específico (vazio = próximo)'
        required: false
      account:
        description: 'Conta específica (vazio = rotaciona)'
        required: false
      dry_run:
        description: 'Dry run'
        required: false
        type: boolean
        default: false
      force:
        description: 'Ignorar gatekeeper de schedule'
        required: false
        type: boolean
        default: false

jobs:
  check-gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      week_label: ${{ steps.gate.outputs.week_label }}
      disabled_accounts: ${{ steps.gate.outputs.disabled_accounts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kill switch + ramp schedule check
        id: gate
        run: |
          # Kill switch global
          if [ -n "${{ vars.KILL_SWITCH_MIDAS }}" ]; then
            echo "🛑 KILL SWITCH — abortado"
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Force override
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "⚡ Force mode — skipping schedule check"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "week_label=forced" >> $GITHUB_OUTPUT
            echo "disabled_accounts=${{ vars.MIDAS_DISABLED_ACCOUNTS }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Workflow_dispatch manual sempre publica (exceto kill switch)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "🎯 Manual trigger — publishing"
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "week_label=manual" >> $GITHUB_OUTPUT
            echo "disabled_accounts=${{ vars.MIDAS_DISABLED_ACCOUNTS }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Cron scheduled — roda o gatekeeper
          GATE=$(node scripts/midas/midas-schedule-check.js 2>&1 || true)
          echo "Gate output: $GATE"
          SHOULD=$(echo "$GATE" | jq -r '.should_publish // false')
          LABEL=$(echo "$GATE" | jq -r '.week_label // "unknown"')
          DAYS=$(echo "$GATE" | jq -r '.days_since_start // 0')

          echo "📅 Semana: $LABEL (dia $DAYS)"

          if [ "$SHOULD" = "true" ]; then
            echo "✅ Slot permite publicação"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "⏸️ Slot fora da janela — abortando ciclo"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi
          echo "week_label=$LABEL" >> $GITHUB_OUTPUT
          echo "disabled_accounts=${{ vars.MIDAS_DISABLED_ACCOUNTS }}" >> $GITHUB_OUTPUT

  publish:
    needs: check-gate
    if: needs.check-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    concurrency:
      group: midas-publish
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Random jitter (anti-detection)
        run: |
          DELAY=$((RANDOM % 240 + 30))
          echo "⏱️  Jitter de $DELAY segundos..."
          sleep $DELAY

      - name: Install deps
        run: |
          npm install @anthropic-ai/sdk dotenv
          pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Pick next video + account
        id: pick
        run: |
          node scripts/midas/midas-pick-next.js \
            ${{ github.event.inputs.video && format('--video={0}', github.event.inputs.video) || '' }} \
            ${{ github.event.inputs.account && format('--account={0}', github.event.inputs.account) || '' }} \
            > pick.json
          cat pick.json

          ACCOUNT=$(jq -r '.account' pick.json)
          DISABLED="${{ needs.check-gate.outputs.disabled_accounts }}"
          if echo ",$DISABLED," | grep -q ",$ACCOUNT,"; then
            echo "🛑 Conta $ACCOUNT desativada"
            exit 0
          fi

      - name: Generate captions
        run: |
          VIDEO=$(jq -r '.video' pick.json)
          CAPTIONS="midas/captions/${VIDEO%.mp4}.json"
          [ -f "$CAPTIONS" ] || node scripts/midas/midas-generate-captions.js --video="$VIDEO"

      - name: Ensure Cloudinary upload
        if: ${{ github.event.inputs.dry_run != 'true' }}
        id: upload
        run: |
          VIDEO=$(jq -r '.video' pick.json)
          PICK_URL=$(jq -r '.url' pick.json)
          if [ -n "$PICK_URL" ] && [ "$PICK_URL" != "null" ]; then
            echo "✅ URL já no manifest: $PICK_URL"
            echo "url=$PICK_URL" >> $GITHUB_OUTPUT
          else
            node scripts/midas/midas-upload-cloudinary.js --video="$VIDEO" | tee upload.log
            URL=$(grep -oP 'https://res\.cloudinary\.com\S+\.mp4' upload.log | head -1)
            echo "url=$URL" >> $GITHUB_OUTPUT
          fi

      - name: Publish via Publer (primary)
        if: ${{ github.event.inputs.dry_run != 'true' && env.PUBLER_API_KEY != '' }}
        continue-on-error: true
        id: publer
        env:
          PUBLER_API_KEY: ${{ secrets.PUBLER_API_KEY }}
          PUBLER_WORKSPACE_ID: ${{ secrets.PUBLER_WORKSPACE_ID }}
        run: |
          VIDEO=$(jq -r '.video' pick.json)
          ACCOUNT=$(jq -r '.account' pick.json)
          VIDEO_URL="${{ steps.upload.outputs.url }}"
          if [ -z "$VIDEO_URL" ]; then
            echo "❌ videoUrl vazio — abortando"
            exit 1
          fi
          node scripts/midas/midas-publish-publer.js \
            --account="$ACCOUNT" \
            --video="$VIDEO" \
            --videoUrl="$VIDEO_URL" \
            --platform=all
          echo "publer_ran=true" >> $GITHUB_OUTPUT

      - name: Publish Instagram Reel (fallback Meta API)
        if: ${{ github.event.inputs.dry_run != 'true' && steps.publer.outputs.publer_ran != 'true' }}
        continue-on-error: true
        env:
          IG_TOKEN_1: ${{ secrets.IG_TOKEN_1 }}
          IG_TOKEN_2: ${{ secrets.IG_TOKEN_2 }}
          IG_TOKEN_3: ${{ secrets.IG_TOKEN_3 }}
        run: |
          VIDEO=$(jq -r '.video' pick.json)
          ACCOUNT=$(jq -r '.account' pick.json)
          VIDEO_URL="${{ steps.upload.outputs.url }}"
          if [ -z "$VIDEO_URL" ]; then
            echo "❌ videoUrl vazio — abortando IG publish"
            exit 1
          fi
          CAPTION=$(jq -r ".[\"$ACCOUNT\"].caption_ig" "midas/captions/${VIDEO%.mp4}.json")
          node scripts/midas/midas-publish-ig.js \
            --account="$ACCOUNT" \
            --video="$VIDEO" \
            --videoUrl="$VIDEO_URL" \
            --caption="$CAPTION"

      - name: Publish YouTube Short (fallback YT API)
        if: ${{ github.event.inputs.dry_run != 'true' && steps.publer.outputs.publer_ran != 'true' }}
        continue-on-error: true
        env:
          YT_OAUTH_1: ${{ secrets.YT_OAUTH_1 }}
          YT_OAUTH_2: ${{ secrets.YT_OAUTH_2 }}
          YT_OAUTH_3: ${{ secrets.YT_OAUTH_3 }}
        run: |
          VIDEO=$(jq -r '.video' pick.json)
          ACCOUNT=$(jq -r '.account' pick.json)
          YT_ENV=$(jq -r ".accounts[] | select(.id==\"$ACCOUNT\") | .youtube_oauth_env" midas/config/accounts.json)
          if [ -z "$YT_ENV" ] || [ "$YT_ENV" = "null" ] || [ -z "${!YT_ENV}" ]; then
            echo "⏭️ YT OAuth não configurado pra $ACCOUNT (env=$YT_ENV), skip"
            exit 0
          fi
          CAPTION=$(jq -r ".[\"$ACCOUNT\"].caption_youtube" "midas/captions/${VIDEO%.mp4}.json")
          HOOK=$(jq -r ".[\"$ACCOUNT\"].hook" "midas/captions/${VIDEO%.mp4}.json")
          node scripts/midas/midas-publish-yt-shorts.js \
            --account="$ACCOUNT" --video="$VIDEO" \
            --title="$HOOK #Shorts" --description="$CAPTION"

      - name: Commit state
        run: |
          git config user.name "midas-bot"
          git config user.email "midas-bot@users.noreply.github.com"
          git add midas/state/ midas/captions/ || true
          git commit -m "chore(midas): state update [${{ needs.check-gate.outputs.week_label }}] [skip ci]" || echo "No changes"
          git push || echo "Push skipped"

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      PUBLER_API_KEY: ${{ secrets.PUBLER_API_KEY }}
      PUBLER_WORKSPACE_ID: ${{ secrets.PUBLER_WORKSPACE_ID }}
      MIDAS_CORTES_DIR: /tmp/midas-cortes
